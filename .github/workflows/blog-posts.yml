name: Update Latest Blog Posts

on:
  repository_dispatch:
    types: [blog-updated]
  workflow_dispatch:

concurrency:
  group: blog-posts
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  DAGGER_VERSION: "0.20.8"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Dagger
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Resolve articles markdown
        id: articles
        env:
          PAYLOAD_ARTICLES: ${{ github.event.client_payload.articles_markdown }}
        run: |
          set -euo pipefail
          if [ -n "${PAYLOAD_ARTICLES:-}" ]; then
            echo "Using articles_markdown from repository_dispatch payload"
            articles="$PAYLOAD_ARTICLES"
          else
            echo "No payload; fetching latest articles from blog README"
            articles="$(dagger call fetch-latest-articles)"
          fi
          {
            echo 'articles<<ARTICLES_EOF'
            printf '%s\n' "$articles"
            echo 'ARTICLES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Splice README via Dagger
        env:
          ARTICLES: ${{ steps.articles.outputs.articles }}
        run: |
          dagger call update-readme --articles-markdown="$ARTICLES" export --path=./README.md

      - name: Commit README via Contents API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet README.md; then
            echo "No changes to README.md, skipping."
            exit 0
          fi
          CONTENT=$(base64 -w 0 README.md)
          SHA=$(gh api repos/${{ github.repository }}/contents/README.md --jq '.sha')
          gh api --method PUT repos/${{ github.repository }}/contents/README.md \
            -f message="Update latest blog posts in README" \
            -f content="$CONTENT" \
            -f sha="$SHA"
